          anyOf:
          - type: string
          - type: 'null'
          description: 'RRP-0026: exact match against author.orcid. RRP-0028: comma-separated values OR-combine.'
          title: Orcid
        description: 'RRP-0026: exact match against author.orcid. RRP-0028: comma-separated values OR-combine.'
      - name: agent_handle
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
