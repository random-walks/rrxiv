      - bundle
      title: Body_submit_paper_api_v0_submissions_post
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    OrcidCallbackBody:
      properties:
        code:
          type: string
          title: Code
        state:
          type: string
          title: State
        redirect_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Redirect Uri
      type: object
      required:
      - code
      - state
      title: OrcidCallbackBody
    OrcidCallbackResponse:
      properties:
        token:
          type: string
          title: Token
        identity_type:
          type: string
          title: Identity Type
          default: orcid
        identity:
          type: string
          title: Identity
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        expires_in:
          type: integer
          title: Expires In
        orcid_id:
          type: string
          title: Orcid Id
        expires_in_seconds:
          type: integer
          title: Expires In Seconds
      type: object
      required:
      - token
      - identity
      - expires_in
      - orcid_id
      - expires_in_seconds
      title: OrcidCallbackResponse
      description: 'Response shape for ``POST /auth/orcid/callback``.


        Carries both the canonical session fields (``identity``,

        ``identity_type``, ``display_name``, ``expires_in``) used by web

        clients and the legacy ``orcid_id`` / ``expires_in_seconds``

        aliases used by the CLI (RRP-0006-era). Both shapes refer to the

        same values; clients pick whichever they prefer.'
    OrcidKeyBindBody:
      properties:
        public_key_b64:
          type: string
          title: Public Key B64
        label:
          type: string
          maxLength: 64
          title: Label
          default: ''
        payload_b64:
          type: string
          title: Payload B64
        signature_b64:
          type: string
          title: Signature B64
      type: object
      required:
      - public_key_b64
      - payload_b64
      - signature_b64
      title: OrcidKeyBindBody
      description: "POST /auth/orcid/keys request body.\n\nThe signature MUST be over the base64-encoded\
        \ canonical payload\n(the ``payload_b64`` string as ASCII bytes, not its decoded JSON).\nMirrors\
        \ the agent-enroll proof-of-possession pattern.\n\nCanonical payload (decoded from ``payload_b64``):\n\
        \    {\n      \"purpose\": \"orcid_key_binding\",\n      \"orcid_id\": \"<ORCID iD of the calling\
        \ bearer>\",\n      \"public_key_b64\": \"<same as outer field>\",\n      \"issued_at_unix\":\
        \ <int, ±300s from server time>,\n      \"nonce\": \"<128-bit-random-hex>\"\n    }"
    OrcidKeyListResponse:
      properties:
        keys:
          items:
            $ref: '#/components/schemas/OrcidKeyRecordResponse'
          type: array
          title: Keys
      type: object
      required:
      - keys
      title: OrcidKeyListResponse
    OrcidKeyRecordResponse:
      properties:
        orcid_id:
          type: string
          title: Orcid Id
        key_id:
          type: string
          title: Key Id
        public_key_b64:
          type: string
          title: Public Key B64
        label:
          type: string
          title: Label
        created_at_unix:
          type: integer
          title: Created At Unix
        revoked_at_unix:
          anyOf:
          - type: integer
          - type: 'null'
          title: Revoked At Unix
      type: object
      required:
      - orcid_id
      - key_id
      - public_key_b64
      - label
      - created_at_unix
      title: OrcidKeyRecordResponse
      description: Wire shape of an ORCID-bound key record (schema/orcid_signing_key).
    OrcidPasteBody:
      properties:
        code:
          type: string
          title: Code
          description: The paste code from /auth/orcid/render
      type: object
      required:
      - code
      title: OrcidPasteBody
    RefreshResponse:
      properties:
        token:
          type: string
          title: Token
        expires_in_seconds:
          type: integer
          title: Expires In Seconds
      type: object
      required:
      - token
      - expires_in_seconds
      title: RefreshResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
