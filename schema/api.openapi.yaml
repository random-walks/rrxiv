openapi: 3.1.0
info:
  title: rrxiv HTTP API
  version: 0.1.0
  description: |
    The rrxiv HTTP API. v0.1 sketch — the surface is unstable until v1.0.

    See `spec/0007-api.md` for the prose companion that explains design
    choices behind individual endpoints.

    Schemas are referenced from the standalone JSON Schema files in this
    directory. Any conforming server MUST validate request and response
    payloads against the referenced schemas.
  license:
    name: MIT (code), CC-BY-4.0 (spec)
    url: https://github.com/random-walks/rrxiv

servers:
  - url: https://rrxiv.com/api/v0
    description: Canonical instance (planned).
  - url: http://localhost:8000/api/v0
    description: Local development.

tags:
  - name: Papers
    description: Paper metadata, CIR retrieval, source bundle access, submissions.
  - name: Claims
    description: Claim retrieval and claim-graph traversals.
  - name: Annotations
    description: Post-submission annotations (replications, errata, comments, ...).
  - name: Citations
    description: Bibliographic records and reverse-citation indexing.
  - name: Snapshots
    description: Mandatory full-corpus snapshot exports.
  - name: Search
    description: Free-text convenience search.
  - name: System
    description: Version, health, capability discovery.

# ---- Reusable parameters ----
components:
  parameters:
    PaperId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: Stable paper ID (UUIDv7 in v0).
    ClaimId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: Globally unique claim ID, conventionally `<paper_id>:<label>`.
    AnnotationId:
      name: id
      in: path
      required: true
      schema: { type: string }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Opaque pagination cursor from a previous response's `next_cursor`.
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Depth:
      name: depth
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 10, default: 1 }
      description: Graph-walk depth in hops. Servers may cap; over-cap returns 422.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
      description: |
        Caller-generated unique key. Repeated requests with the same key
        return the original response; same key with a different body
        returns 409. Required on all write endpoints.

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer token from the OAuth/agent/anonymous-attestation flow.
        See `spec/0005-submission.md` and `spec/0007-api.md` §"Auth model".

  schemas:
    Problem:
      type: object
      description: RFC 9457 problem details payload.
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      additionalProperties: true
    PaginatedPapers:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "paper.schema.json"
        next_cursor:
          type: [string, "null"]
    PaginatedClaims:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "claim.schema.json"
        next_cursor:
          type: [string, "null"]
    PaginatedAnnotations:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "annotation.schema.json"
        next_cursor:
          type: [string, "null"]
    BulkAnnotationsRequest:
      type: object
      required: [annotations]
      description: |
        Body for `POST /annotations/bulk` (RRP-TBD; landed Sprint 19 P3).
        Each item is an `annotation.schema.json` payload. The server
        validates and persists each entry independently — partial
        success is allowed. Up to 100 items per request.
      properties:
        annotations:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: "annotation.schema.json"
    BulkAnnotationsResponse:
      type: object
      required: [results]
      description: |
        Per-index result list for a bulk POST. The outer HTTP status is
        always 200; clients check `results[i].status` to detect partial
        failures. Best-effort semantics: validation errors on item N do
        not abort items > N.
      properties:
        results:
          type: array
          items:
            type: object
            required: [index, status]
            properties:
              index:
                type: integer
                minimum: 0
                description: Zero-based index into the request array.
              status:
                type: integer
                description: HTTP-shaped status code (201 success, 400/422/409 failure).
              body:
                description: The persisted annotation when `status==201`.
                $ref: "annotation.schema.json"
              error:
                description: |
                  Either a `Problem`-shaped object (string keys) or a
                  pydantic ValidationError detail list (for `status==422`).
                oneOf:
                  - type: string
                  - type: array
                  - type: object
    GraphWalk:
      type: object
      required: [origin, edges]
      properties:
        origin:
          type: string
        edges:
          type: array
          items:
            type: object
            required: [source, target, kind]
            properties:
              source: { type: string }
              target: { type: string }
              kind:
                type: string
                enum: [depends_on, supports, contradicts, extends]
              annotation_id:
                type: [string, "null"]
                description: If the edge originates from an annotation, the annotation's ID.
    SnapshotManifest:
      type: object
      required: [snapshot_id, created_at, papers, annotations, sha256, size_bytes, download_uri]
      properties:
        snapshot_id: { type: string }
        created_at: { type: string, format: date-time }
        papers: { type: integer, minimum: 0 }
        annotations: { type: integer, minimum: 0 }
        sha256: { type: string, pattern: "^[a-f0-9]{64}$" }
        size_bytes: { type: integer, minimum: 0 }
        download_uri: { type: string, format: uri }

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds to wait before retrying.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ValidationError:
      description: Request was understood but rejected on validation grounds.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

# ---- Endpoints ----
paths:
  /version:
    get:
      tags: [System]
      summary: Server and protocol version.
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema:
                type: object
                required: [server, protocol, supported_api_versions]
                properties:
                  server: { type: string }
                  protocol: { type: string }
                  supported_api_versions:
                    type: array
                    items: { type: string }

  # ---- Auth (RRP-0005) ----
  /auth/orcid/start:
    get:
      tags: [Auth]
      summary: Begin the ORCID OAuth flow.
      description: |
        Server redirects the user to orcid.org with its registered
        client_id. The user approves the requested scope; orcid.org
        redirects to `redirect_uri` with `?code=…&state=…`.

        The client must verify that the returned `state` matches what
        it sent here.
      parameters:
        - { name: redirect_uri, in: query, required: true, schema: { type: string, format: uri } }
        - { name: scope,        in: query, required: false, schema: { type: string, default: "/authenticate" } }
        - { name: state,        in: query, required: true, schema: { type: string }, description: "Client-generated CSRF token." }
      responses:
        "302":
          description: Redirect to orcid.org with the OAuth authorization request.
          headers:
            Location: { schema: { type: string, format: uri } }

  /auth/orcid/callback:
    post:
      tags: [Auth]
      summary: Exchange an ORCID OAuth code for a rrxiv bearer token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, state]
              properties:
                code:  { type: string, description: "Authorization code from orcid.org." }
                state: { type: string, description: "CSRF token; must match the value sent to /auth/orcid/start." }
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token, orcid_id]
                properties:
                  token:    { type: string, description: "Opaque bearer token." }
                  orcid_id: { type: string, description: "ORCID iD, e.g. 0000-0001-2345-6789." }
                  expires_in_seconds: { type: integer, minimum: 0 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /auth/agent/enroll:
    post:
      tags: [Auth]
      summary: Enroll an agent and receive a bearer token.
      description: |
        Submits an agent handle, an Ed25519 public key, and a signed
        canonical enrollment payload. Server verifies the signature
        and issues a bearer token bound to the handle.

        See RRP-0005 §"Agent enrollment" for the canonical payload
        format and signature semantics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle, public_key_b64, payload_b64, signature_b64]
              properties:
                handle:
                  type: string
                  pattern: "^@[a-z0-9][-a-z0-9]{0,31}$"
                  description: "Agent handle, e.g. @my-extractor."
                public_key_b64:
                  type: string
                  description: "Base64 standard-encoded 32-byte Ed25519 public key."
                payload_b64:
                  type: string
                  description: "Base64 of the canonical enrollment JSON payload (sorted keys, no whitespace)."
                signature_b64:
                  type: string
                  description: "Base64 Ed25519 signature over the payload_b64 string bytes."
                contact:
                  type: string
                  format: email
                  description: "Optional ops contact for abuse reports."
      responses:
        "201":
          description: Enrollment accepted; token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token, handle]
                properties:
                  token:  { type: string }
                  handle: { type: string }
                  expires_in_seconds: { type: integer, minimum: 0 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: "Handle already taken or not permitted (reserved prefix)."
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /auth/anonymous/challenge:
    post:
      tags: [Auth]
      summary: Request an anonymous-attestation challenge.
      responses:
        "200":
          description: Challenge issued.
          content:
            application/json:
              schema:
                type: object
                required: [challenge_id, challenge_type, site_key, expires_in_seconds]
                properties:
                  challenge_id:
                    type: string
                    description: "Opaque challenge ID; pass back unchanged in /verify."
                  challenge_type:
                    type: string
                    enum: [hcaptcha]
                    description: "Challenge mechanism. v0.1 supports hCaptcha only."
                  site_key:
                    type: string
                    description: "Per-server widget key for rendering the challenge."
                  expires_in_seconds:
                    type: integer
                    minimum: 1

  /auth/anonymous/verify:
    post:
      tags: [Auth]
      summary: Submit a solved challenge and receive a bearer token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, response]
              properties:
                challenge_id: { type: string }
                response:
                  type: string
                  description: "Solution token (e.g. hCaptcha h-captcha-response)."
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token: { type: string }
                  expires_in_seconds: { type: integer, minimum: 0 }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /papers:
    get:
      tags: [Papers]
      summary: List papers.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - { name: author,  in: query, schema: { type: string }, description: ORCID. }
        - { name: topic,   in: query, schema: { type: string } }
        - { name: since,   in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Paginated paper metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedPapers" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /papers/{id}:
    get:
      tags: [Papers]
      summary: One paper's metadata.
      parameters: [ { $ref: "#/components/parameters/PaperId" } ]
      responses:
        "200":
          description: Paper metadata.
          content:
            application/json:
              schema: { $ref: "paper.schema.json" }
        "404": { $ref: "#/components/responses/NotFound" }

  /papers/{id}/cir:
    get:
      tags: [Papers]
      summary: The full Canonical Intermediate Representation.
      parameters: [ { $ref: "#/components/parameters/PaperId" } ]
      responses:
        "200":
          description: Full CIR.
          content:
            application/json:
              schema: { $ref: "cir.schema.json" }
        "404": { $ref: "#/components/responses/NotFound" }

  /papers/{id}/source:
    get:
      tags: [Papers]
      summary: Redirect to the source bundle URI.
      parameters: [ { $ref: "#/components/parameters/PaperId" } ]
      responses:
        "302":
          description: Redirect to the source tarball.
          headers:
            Location: { schema: { type: string, format: uri } }

  /papers/{id}/versions:
    get:
      tags: [Papers]
      summary: All revisions of this paper, oldest first.
      parameters: [ { $ref: "#/components/parameters/PaperId" } ]
      responses:
        "200":
          description: Lineage list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "paper.schema.json" }

  /papers/{id}/diff:
    get:
      tags: [Papers]
      summary: Semantic diff between two versions of this paper.
      description: |
        Computes the structural diff between two versions of the same paper.
        `{id}` is the newer paper; `from` is the prior version's paper_id.
        Both must share a `previous_version` lineage; otherwise 400. The diff
        is deterministic and cacheable (immutable inputs → immutable output).
        See RRP-0017.
      parameters:
        - { $ref: "#/components/parameters/PaperId" }
        - in: query
          name: from
          required: true
          schema: { type: string, format: uuid }
          description: Paper ID of the prior version.
      responses:
        "200":
          description: Revision diff between `from` and the path-`id` paper.
          content:
            application/json:
              schema: { $ref: "revision_diff.schema.json" }
        "400":
          description: Papers are not in the same lineage (or `from` is missing).
        "404":
          description: Either paper does not exist.

  /papers/{id}/errata:
    get:
      tags: [Papers]
      summary: List erratum annotations for this paper.
      description: Convenience endpoint that filters /annotations to `annotation_type=erratum` for `target_id=<paper_id>`. Ordered by `created_at` desc. Paginated via cursor.
      parameters:
        - { $ref: "#/components/parameters/PaperId" }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200":
          description: Erratum list with pagination cursor.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "annotation.schema.json" }
                  next_cursor: { type: [string, "null"] }

  /submissions:
    post:
      tags: [Papers]
      summary: Submit a new paper or revision.
      description: |
        Multipart-encoded request following submission_request.schema.json.
        When `dry_run=true`, the server performs validation + compile + parse
        + diff without persisting; the response carries the would-be paper_id
        as null and a `would_persist` boolean. See RRP-0016.
      security: [{ BearerAuth: [] }]
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "submission_request.schema.json" }
      responses:
        "200":
          description: Dry-run completed; would-be result returned, nothing persisted.
          content:
            application/json:
              schema:
                type: object
                required: [paper_id, would_persist, dry_run]
                properties:
                  paper_id: { type: [string, "null"] }
                  id_slug: { type: [string, "null"] }
                  version: { type: [string, "null"] }
                  previous_version: { type: [string, "null"] }
                  revision_diff:
                    oneOf:
                      - { $ref: "revision_diff.schema.json" }
                      - { type: "null" }
                  would_persist: { type: boolean }
                  dry_run: { type: boolean, const: true }
        "201":
          description: Submission accepted and persisted; paper ID minted.
          content:
            application/json:
              schema:
                type: object
                required: [paper_id, retrieval_uri, version, would_persist, dry_run]
                properties:
                  paper_id: { type: string }
                  id_slug: { type: string }
                  retrieval_uri: { type: string, format: uri }
                  version: { type: string }
                  previous_version: { type: [string, "null"] }
                  revision_diff:
                    oneOf:
                      - { $ref: "revision_diff.schema.json" }
                      - { type: "null" }
                  would_persist: { type: boolean, const: true }
                  dry_run: { type: boolean, const: false }
        "400":
          description: |
            Submission rejected — bundle constraint violation, bundle_hash_mismatch,
            previous_version not found, or other client-side error.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: Idempotency-Key collision with a different body.
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /claims:
    get:
      tags: [Claims]
      summary: List claims with filters.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - { name: claim_type, in: query, schema: { type: string } }
        - { name: evidence_type, in: query, schema: { type: string } }
        - { name: replication_status, in: query, schema: { type: string } }
        - { name: paper, in: query, schema: { type: string } }
        - { name: canonical, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: Paginated claims.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedClaims" }

  /claims/{id}:
    get:
      tags: [Claims]
      summary: One claim.
      parameters: [ { $ref: "#/components/parameters/ClaimId" } ]
      responses:
        "200":
          description: Claim record.
          content:
            application/json:
              schema: { $ref: "claim.schema.json" }
        "404": { $ref: "#/components/responses/NotFound" }

  /claims/{id}/depends-on:
    get:
      tags: [Claims]
      summary: Outgoing depends_on walk.
      parameters:
        - $ref: "#/components/parameters/ClaimId"
        - $ref: "#/components/parameters/Depth"
      responses:
        "200":
          description: Walk result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GraphWalk" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /claims/{id}/dependents:
    get:
      tags: [Claims]
      summary: Reverse depends_on walk.
      parameters:
        - $ref: "#/components/parameters/ClaimId"
        - $ref: "#/components/parameters/Depth"
      responses:
        "200":
          description: Walk result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GraphWalk" }

  /annotations:
    get:
      tags: [Annotations]
      summary: List annotations.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - { name: target, in: query, schema: { type: string } }
        - { name: annotation_type, in: query, schema: { type: string } }
        - { name: created_by, in: query, schema: { type: string } }
        - { name: since, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Paginated annotations.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedAnnotations" }
    post:
      tags: [Annotations]
      summary: Create a new annotation.
      security: [{ BearerAuth: [] }]
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "annotation.schema.json" }
      responses:
        "201":
          description: Annotation created.
          content:
            application/json:
              schema: { $ref: "annotation.schema.json" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { description: Idempotency-Key collision. }
        "422": { $ref: "#/components/responses/ValidationError" }

  /annotations/bulk:
    post:
      tags: [Annotations]
      summary: Create up to 100 annotations in a single request.
      description: |
        Batched annotation create. Each item is validated and persisted
        independently; the response carries a per-index status array so
        partial success surfaces cleanly. Counts as **one** request
        against the per-identity rate limiter regardless of payload size
        — the motivating use case (Sprint 16) was a 44-claim retraction
        that previously tripped the 30 rpm write budget.

        Auth: named identity required (ORCID or agent). Anonymous
        identities are forbidden, matching `POST /annotations`. No
        outer-call `Idempotency-Key`; each inner annotation MAY carry
        its own `id` for client-side dedup on retries.

        The HTTP status of the bulk call itself is always `200` when the
        envelope parses; per-item failures appear in `results[i].status`.
        `400` is returned only for envelope-level rejections (missing
        `annotations` array, oversize batch).
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkAnnotationsRequest" }
      responses:
        "200":
          description: Per-index outcomes (some may be failures).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkAnnotationsResponse" }
        "400":
          description: Envelope rejected (missing array, > 100 items).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Anonymous identities forbidden. }
        "429": { $ref: "#/components/responses/RateLimited" }

  /annotations/{id}:
    get:
      tags: [Annotations]
      summary: One annotation.
      parameters: [ { $ref: "#/components/parameters/AnnotationId" } ]
      responses:
        "200":
          description: Annotation record.
          content:
            application/json:
              schema: { $ref: "annotation.schema.json" }
        "404": { $ref: "#/components/responses/NotFound" }

  /annotations/{id}/replies:
    get:
      tags: [Annotations]
      summary: Direct replies to this annotation.
      description: |
        Returns annotations whose `in_reply_to` field equals `{id}`, ordered by
        `created_at` ascending. Reduces client-side filtering when reconstructing
        threads. See RRP-0018.
      parameters:
        - { $ref: "#/components/parameters/AnnotationId" }
        - { $ref: "#/components/parameters/Cursor" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200":
          description: Paginated direct replies, oldest first.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedAnnotations" }
        "404": { $ref: "#/components/responses/NotFound" }

  /snapshots/latest:
    get:
      tags: [Snapshots]
      summary: Manifest for the most recent full snapshot.
      responses:
        "200":
          description: Snapshot manifest.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SnapshotManifest" }

  /snapshots:
    get:
      tags: [Snapshots]
      summary: Paginated snapshot history.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
