components:
  schemas:
    AgentEnrollBody:
      properties:
        handle:
          type: string
          pattern: ^@[a-z0-9][-a-z0-9]{0,31}$
          title: Handle
        public_key_b64:
          type: string
          title: Public Key B64
        payload_b64:
          type: string
          title: Payload B64
        signature_b64:
          type: string
          title: Signature B64
        contact:
          anyOf:
          - type: string
            format: email
          - type: 'null'
          title: Contact
      type: object
      required:
      - handle
      - public_key_b64
      - payload_b64
      - signature_b64
      title: AgentEnrollBody
    AgentEnrollResponse:
      properties:
        token:
          type: string
          title: Token
        handle:
          type: string
          title: Handle
        expires_in_seconds:
          type: integer
          title: Expires In Seconds
      type: object
      required:
      - token
      - handle
      - expires_in_seconds
      title: AgentEnrollResponse
    AgentRotateKeyBody:
      properties:
        new_public_key_b64:
          type: string
          title: New Public Key B64
        rotation_payload_b64:
          type: string
          title: Rotation Payload B64
        new_signature_b64:
          type: string
          title: New Signature B64
      type: object
      required:
      - new_public_key_b64
      - rotation_payload_b64
      - new_signature_b64
      title: AgentRotateKeyBody
    AgentRotateKeyResponse:
      properties:
        handle:
          type: string
          title: Handle
        public_key_b64:
          type: string
          title: Public Key B64
        rotated_at_unix:
          type: integer
          title: Rotated At Unix
      type: object
      required:
      - handle
      - public_key_b64
      - rotated_at_unix
      title: AgentRotateKeyResponse
    AnonymousChallengeResponseModel:
      properties:
        challenge_id:
          type: string
          title: Challenge Id
        challenge_type:
          type: string
          title: Challenge Type
        site_key:
          type: string
          title: Site Key
        expires_in_seconds:
          type: integer
          title: Expires In Seconds
      type: object
      required:
      - challenge_id
      - challenge_type
      - site_key
      - expires_in_seconds
      title: AnonymousChallengeResponseModel
    AnonymousVerifyBody:
      properties:
        challenge_id:
          type: string
          title: Challenge Id
        response:
          type: string
          title: Response
      type: object
      required:
      - challenge_id
      - response
      title: AnonymousVerifyBody
    AnonymousVerifyResponse:
      properties:
        token:
          type: string
          title: Token
        expires_in_seconds:
          type: integer
          title: Expires In Seconds
      type: object
      required:
      - token
      - expires_in_seconds
      title: AnonymousVerifyResponse
    Body_submit_paper_api_v0_submissions_post:
      properties:
        cir:
          type: string
          contentMediaType: application/octet-stream
          title: Cir
        bundle:
          type: string
          contentMediaType: application/octet-stream
          title: Bundle
        pdf:
          anyOf:
          - type: string
            contentMediaType: application/octet-stream
          - type: 'null'
          title: Pdf
        previous_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Previous Version
        revision_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Revision Summary
        dry_run:
          anyOf:
          - type: string
          - type: 'null'
          title: Dry Run
