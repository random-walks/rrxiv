site_name: rrxiv
site_description: An open protocol for research preprints in the era of human-agent coproduction.
site_url: https://random-walks.github.io/rrxiv/
site_author: rrxiv contributors
copyright: Content licensed CC-BY 4.0; code MIT.

repo_url: https://github.com/random-walks/rrxiv
repo_name: random-walks/rrxiv
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/file-edit-outline

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.', '..']
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;'
  - include-markdown:
      preserve_includer_indent: true
      dedent: false
      trailing_newlines: true
      comments: false
  - awesome-pages

nav:
  - Home: index.md
  - Protocol:
    - protocol/index.md
    - Bootstrap: protocol/bootstrap.md
    - Whitepaper: protocol/whitepaper.md
  - Spec:
    - spec/index.md
    - 0001 — Overview: spec/0001-overview.md
    - 0002 — CIR: spec/0002-cir.md
    - 0003 — Claim graph: spec/0003-claim-graph.md
    - 0004 — TeX template: spec/0004-tex-template.md
    - 0005 — Submission: spec/0005-submission.md
    - 0006 — Annotations: spec/0006-annotations.md
    - 0007 — API: spec/0007-api.md
    - 0008 — Governance: spec/0008-governance.md
  - Proposals:
    - proposals/index.md
    - 0000 — Template: proposals/0000-template.md
    - 0001 — Claim graph (retroactive): proposals/0001-claim-graph.md
    - 0002 — Edge marker delimiter: proposals/0002-edge-marker-delimiter.md
    - 0003 — Whitepaper formatting: proposals/0003-whitepaper-formatting.md
  - Contributing:
    - contributing/index.md
    - Code of Conduct: contributing/code-of-conduct.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/random-walks/rrxiv
      name: rrxiv on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css
