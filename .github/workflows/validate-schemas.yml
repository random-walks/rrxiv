name: validate-schemas

on:
  push:
    branches: [main]
    paths:
      - 'schema/**'
      - 'tests/schemas/**'
      - '.github/workflows/validate-schemas.yml'
  pull_request:
    paths:
      - 'schema/**'
      - 'tests/schemas/**'
      - '.github/workflows/validate-schemas.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ajv tooling
        run: npm install -g ajv@8 ajv-formats@3

      - name: Validate every schema against the JSON Schema 2020-12 meta-schema
        # ajv-cli's `compile -s X -r Y` deduplication is per-key, not per-$id —
        # passing the same schema as both -s and -r errors with "already exists".
        # And running per-file with no -r breaks on cross-file $refs
        # (cir.schema.json -> paper.schema.json#/$defs/Author).
        #
        # Tiny inline Node script: addSchema every sibling once, then compile
        # each by $id. Same pattern tests/schemas/test.mjs uses; strictly
        # stronger than the per-file ajv-cli loop because cross-refs resolve.
        run: |
          node -e '
            import("ajv/dist/2020.js").then(async ({default: Ajv2020}) => {
              const addFormats = (await import("ajv-formats")).default;
              const {readFileSync, readdirSync} = await import("node:fs");
              const {join} = await import("node:path");
              const ajv = new Ajv2020({strict: false, allErrors: true});
              addFormats(ajv);
              const dir = "schema";
              const schemas = readdirSync(dir).filter(f => f.endsWith(".schema.json"));
              for (const f of schemas) ajv.addSchema(JSON.parse(readFileSync(join(dir, f), "utf-8")));
              let failed = 0;
              for (const f of schemas) {
                const s = JSON.parse(readFileSync(join(dir, f), "utf-8"));
                try {
                  ajv.compile(s);
                  console.log(`OK  ${f}`);
                } catch (e) {
                  console.log(`ERR ${f}: ${e.message}`);
                  failed++;
                }
              }
              process.exit(failed > 0 ? 1 : 0);
            });
          '
        env:
          NODE_PATH: /usr/lib/node_modules

      - name: Run schema validation tests if present
        run: |
          if [ -d tests/schemas ] && [ -n "$(ls -A tests/schemas 2>/dev/null)" ]; then
            cd tests/schemas
            if [ -f package.json ]; then
              npm ci
              npm test
            else
              echo "tests/schemas exists but has no package.json — skipping for now"
            fi
          else
            echo "No tests/schemas yet — placeholder until M0.2 lands the test suite"
          fi
