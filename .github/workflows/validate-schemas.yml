name: validate-schemas

on:
  push:
    branches: [main]
    paths:
      - 'schema/**'
      - 'tests/schemas/**'
      - '.github/workflows/validate-schemas.yml'
  pull_request:
    paths:
      - 'schema/**'
      - 'tests/schemas/**'
      - '.github/workflows/validate-schemas.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install schema test deps
        # ajv + ajv-formats are local deps of tests/schemas/, not global.
        # `npm ci` is fast (small package.json, no transitive churn).
        working-directory: tests/schemas
        run: npm ci

      - name: Compile every schema (catches per-schema typos)
        # tests/schemas/compile-all.mjs does the addSchema-all-then-compile
        # pattern so cross-file $refs (cir.schema.json ->
        # paper.schema.json#/$defs/Author) resolve. Strictly stronger than
        # the previous ajv-cli `compile -s "$f"` loop, which broke on any
        # cross-file ref.
        working-directory: tests/schemas
        run: node compile-all.mjs

      - name: Validate fixtures against schemas
        working-directory: tests/schemas
        run: npm test
