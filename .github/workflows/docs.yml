name: docs

on:
  push:
    branches: [main]
    paths:
      - 'mkdocs.yml'
      - 'docs/**'
      - 'spec/**'
      - 'proposals/**'
      - 'README.md'
      - 'BOOTSTRAP.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'mkdocs.yml'
      - 'docs/**'
      - 'spec/**'
      - 'proposals/**'
      - 'README.md'
      - 'BOOTSTRAP.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material and plugins
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs==1.6.* \
            mkdocs-material==9.5.* \
            mkdocs-include-markdown-plugin==6.* \
            mkdocs-awesome-pages-plugin==2.*

      - name: Build site
        # Not using --strict because spec/ docs use relative links to schema/,
        # template/, and whitepaper/ that have no docs-site-side mirrors; those
        # resolve against GitHub when readers click through.
        run: mkdocs build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
