name: conformance-tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/conformance/**'
      - '.github/workflows/conformance-tests.yml'
  pull_request:
    paths:
      - 'tests/conformance/**'
      - '.github/workflows/conformance-tests.yml'
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run conformance suite
        run: |
          if [ -d tests/conformance ] && [ -n "$(ls -A tests/conformance 2>/dev/null)" ]; then
            echo "Conformance suite present — runner TBD per BOOTSTRAP.md M0.5"
            ls -la tests/conformance/
          else
            echo "No conformance tests yet — placeholder workflow until M0.5 lands the suite"
          fi
