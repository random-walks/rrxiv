name: conformance-tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/conformance/**'
      - 'schema/**'
      - 'template/**'
      - '.github/workflows/conformance-tests.yml'
  pull_request:
    paths:
      - 'tests/conformance/**'
      - 'schema/**'
      - 'template/**'
      - '.github/workflows/conformance-tests.yml'
  workflow_dispatch:

jobs:
  parser-conformance:
    name: Parser conformance via rrxiv-python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rrxiv
        uses: actions/checkout@v4
        with:
          path: rrxiv

      - name: Checkout rrxiv-python
        uses: actions/checkout@v4
        with:
          repository: random-walks/rrxiv-python
          path: rrxiv-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install rrxiv-python deps
        working-directory: rrxiv-python
        run: uv sync --all-extras

      - name: Run conformance suite
        working-directory: rrxiv
        run: |
          if [ ! -d tests/conformance/fixtures ] || [ -z "$(ls -A tests/conformance/fixtures 2>/dev/null)" ]; then
            echo "No fixtures present yet — skipping."
            exit 0
          fi
          # Run from rrxiv-python so 'uv run rrxiv' resolves; the runner
          # works with absolute paths so the cwd doesn't otherwise matter.
          cd ../rrxiv-python
          uv run python ../rrxiv/tests/conformance/runner.py \
            --impl 'uv run rrxiv parse' \
            --verbose
